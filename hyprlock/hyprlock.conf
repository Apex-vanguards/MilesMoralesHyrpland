# ╔══════════════════════════════════════════╗
# ║   HYPRLOCK — SPIDER-MAN THEME           ║
# ╚══════════════════════════════════════════╝

general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = false
}

background {
    monitor =
    path = ~/Pictures/wallpapers/thumb-1920-1137946.jpg
    blur_passes = 3
    blur_size = 8
    noise = 0.012
    contrast = 1.1
    brightness = 0.4
    vibrancy = 0.15
    vibrancy_darkness = 0.2
}

# ── Spider logo image (centre top) ───────────────────────────
image {
    monitor =
    path = ~/.config/hyprlock/spider.png
    size = 120
    rounding = 0
    border_size = 2
    border_color = rgb(cc0000)
    position = 0, 180
    halign = center
    valign = center
}

# ── Clock ─────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "<span font_family='Orbitron' font_weight='bold'>$(date +"%H:%M")</span>"
    color = rgba(ff2020ff)
    font_size = 72
    font_family = Orbitron, JetBrainsMono Nerd Font
    position = 0, -10
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(cc000088)
}

# ── Date ──────────────────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(cc0000dd)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, -85
    halign = center
    valign = center
}

# ── Password input ────────────────────────────────────────────
input-field {
    monitor =
    size = 280, 52
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.18
    dots_center = true
    dots_rounding = -1
    outer_color = rgb(cc0000)
    inner_color = rgba(05000099)
    font_color = rgb(ff2020)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <span foreground="##cc0000">  enter password</span>
    hide_input = false
    rounding = 6
    check_color = rgb(ff2020)
    fail_color = rgb(ff0000)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    capslock_color = rgb(ff8800)
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -200
    halign = center
    valign = center
}

# ── User ──────────────────────────────────────────────────────
label {
    monitor =
    text =  $USER
    color = rgba(cc0000cc)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -158
    halign = center
    valign = center
}

# ── Hint ──────────────────────────────────────────────────────
label {
    monitor =
    text = with great power comes great responsibility
    color = rgba(44000088)
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = 0, 20
    halign = center
    valign = bottom
}
