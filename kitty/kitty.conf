# ╔══════════════════════════════════════════════════════════════╗
# ║   KITTY — SPIDER-MAN CYBERPUNK THEME                        ║
# ║   ~/.config/kitty/kitty.conf                                ║
# ╚══════════════════════════════════════════════════════════════╝

# ── FONT ──────────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic

font_size        13.0

# Slightly wider character spacing for that terminal hacker feel
letter_spacing   0
word_spacing     0
line_height      1.1

# Disable ligatures (pure mono look)
disable_ligatures never

# ── CURSOR ────────────────────────────────────────────────────────────────────
cursor                  #ff2020
cursor_text_color       #000000
cursor_shape            block
cursor_blink_interval   0.6
cursor_stop_blinking_after 0

# ── SCROLLBACK ────────────────────────────────────────────────────────────────
scrollback_lines        10000
scrollback_paging_history_size 0

# ── MOUSE ─────────────────────────────────────────────────────────────────────
mouse_hide_wait         2.0
url_color               #ff4444
url_style               curly
open_url_with           default
url_prefixes            file ftp ftps git http https irc ircs kitty mailto news sftp ssh
detect_urls             yes
copy_on_select          no

# ── PERFORMANCE ───────────────────────────────────────────────────────────────
repaint_delay    10
input_delay      3
sync_to_monitor  yes

# ── BELL ──────────────────────────────────────────────────────────────────────
enable_audio_bell        no
visual_bell_duration     0.1
visual_bell_color        #ff0000
window_alert_on_bell     yes
bell_on_tab              "🔴 "

# ── WINDOW LAYOUT ─────────────────────────────────────────────────────────────
remember_window_size     yes
initial_window_width     1000
initial_window_height    650

# ── BACKGROUND IMAGE ──────────────────────────────────────────────────────────
# Resmin tam dosya yolunu buraya yaz (örnek: /home/kullanici/resimler/spiderman.png)
background_image /home/mrcat/Pictures/wallpapers/miles-morales-in-red-and-black-2a.jpg

# Resmin nasıl görüneceği
background_image_layout scaled
background_image_linear no

# Resmin üzerine hafif bir karartma ekler (kodun okunması için çok kritik!)
# 0.0 hiç karartmaz, 1.0 resmi tamamen kapatır (siyah yapar)
background_tint 0.7

# Padding inside the window — gives the content some room
window_padding_width     10 14

# Transparent background — matches waybar's rgba dark look
background_opacity       0.92
dynamic_background_opacity yes

# Blur (requires compositor support e.g. hyprland)
background_blur          24

draw_minimal_borders     yes
window_margin_width      0
single_window_margin_width -1

# ── TABS ──────────────────────────────────────────────────────────────────────
tab_bar_edge             bottom
tab_bar_style            powerline
tab_powerline_style      slanted
tab_bar_min_tabs         1
tab_bar_align            left

tab_title_template       "{fmt.fg._ff2020}{index}{fmt.fg.tab}:{fmt.bold}{title[:16]}"
active_tab_title_template "{fmt.fg._ff2020}󰮯 {fmt.bold}{title[:20]}"

active_tab_foreground    #ff2020
active_tab_background    #1a0000
active_tab_font_style    bold

inactive_tab_foreground  #663333
inactive_tab_background  #0a0000
inactive_tab_font_style  normal

tab_bar_background       #050000
tab_bar_margin_color     #cc0000

# ── COLOR SCHEME — SPIDER-MAN CYBERPUNK ───────────────────────────────────────
# Background & foreground
background              #050000
foreground              #e8e8e8

# Selection
selection_foreground    #000000
selection_background    #cc0000

# Black
color0                  #1a0000
color8                  #3d0000

# Red (primary accent — spider red)
color1                  #cc0000
color9                  #ff2020

# Green → shifted to dark orange-red to stay in theme
color2                  #882200
color10                 #bb3300

# Yellow → warm red-orange
color3                  #993300
color11                 #ff5500

# Blue → deep crimson (keeps dark terminal readable)
color4                  #660011
color12                 #990022

# Magenta → bright red-pink
color5                  #aa0033
color13                 #ff1144

# Cyan → muted rose-white (used for strings/highlights)
color6                  #cc4455
color14                 #ff8899

# White
color7                  #cccccc
color15                 #ffffff

# ── MARKS ─────────────────────────────────────────────────────────────────────
mark1_foreground #000000
mark1_background #ff2020
mark2_foreground #000000
mark2_background #ff5500
mark3_foreground #000000
mark3_background #ff0055

# ── ADVANCED ──────────────────────────────────────────────────────────────────
shell                   fish
editor                  nvim
close_on_child_death    no
allow_remote_control    yes
listen_on               none
update_check_interval   0
startup_session         none
clipboard_control       write-clipboard write-primary read-clipboard-ask read-primary-ask
clipboard_max_size      512
allow_hyperlinks        yes
shell_integration       enabled
term                    xterm-kitty

# ── KEYBINDINGS ───────────────────────────────────────────────────────────────
# Clear defaults and set clean spider-friendly binds
clear_all_shortcuts     no

# Tabs
map ctrl+shift+t        new_tab_with_cwd
map ctrl+shift+w        close_tab
map ctrl+shift+right    next_tab
map ctrl+shift+left     previous_tab
map ctrl+shift+1        goto_tab 1
map ctrl+shift+2        goto_tab 2
map ctrl+shift+3        goto_tab 3
map ctrl+shift+4        goto_tab 4
map ctrl+shift+5        goto_tab 5

# Splits (windows)
map ctrl+shift+enter    new_window_with_cw
map ctrl+shift+]        next_window
map ctrl+shift+[        previous_window

# Font size
map ctrl+equal          change_font_size all +1.0
map ctrl+minus          change_font_size all -1.0
map ctrl+shift+backspace change_font_size all 0

# Clipboard
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard

# Scroll
map ctrl+shift+up       scroll_line_up
map ctrl+shift+down     scroll_line_down
map ctrl+shift+page_up  scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home     scroll_home
map ctrl+shift+end      scroll_end

# Toggle opacity on the fly
map ctrl+shift+a>m      set_background_opacity +0.05
map ctrl+shift+a>l      set_background_opacity -0.05
map ctrl+shift+a>1      set_background_opacity 1
map ctrl+shift+a>d      set_background_opacity default
